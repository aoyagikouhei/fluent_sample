<source>
  @type http
  port 9880
  bind 0.0.0.0
</source>

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<match log.*>
  @type http
  endpoint "#{ENV['ENDPOINT_URL_PREFIX']}/${tag[1]}"
  http_method post
  content_type application/json
  json_array false
  headers {"x-api-key":"password"}
  tls_verify_mode none
  <buffer tag>
    flush_interval 1s
  </buffer>
</match>
