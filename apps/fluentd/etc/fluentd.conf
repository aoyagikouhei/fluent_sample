<source>
  @type http
  port 9880
  bind 0.0.0.0
</source>

<match log.*>
  @type http
  endpoint https://https-portal:443/${path}
  http_method post
  content_type application/json
  json_array false
  headers {"x-api-key":"password"}
  tls_verify_mode none
  <buffer path>
    flush_interval 1s
  </buffer>
</match>
